    let selectedCategory = 'all';
    let selectedDifficulty = 'all';

    function updateStats() {
      const filteredQuestions = getFilteredQuestions();
      document.getElementById('total-count').textContent = filteredQuestions.length;
      document.getElementById('easy-count').textContent = filteredQuestions.filter(q => q.difficulty === 'Easy').length;
      document.getElementById('medium-count').textContent = filteredQuestions.filter(q => q.difficulty === 'Normal').length;
      document.getElementById('hard-count').textContent = filteredQuestions.filter(q => q.difficulty === 'Hardest').length;
    }

    function getFilteredQuestions() {
      return questions.filter(q => {
        const categoryMatch = selectedCategory === 'all' || q.category === selectedCategory;
        const difficultyMatch = selectedDifficulty === 'all' || q.difficulty === selectedDifficulty;
        return categoryMatch && difficultyMatch;
      });
    }

    function populateCategoryFilter() {
      const categories = [...new Set(questions.map(q => q.category))].sort();
      const categoryFilter = document.getElementById('category-filter');
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });
      console.log('Učitane kategorije:', categories);
    }

    function getDifficultyClass(difficulty) {
      switch(difficulty.toLowerCase()) {
        case 'easy': return 'difficulty-easy';
        case 'normal': return 'difficulty-medium';
        case 'hardest': return 'difficulty-hard';
        default: return 'difficulty-medium';
      }
    }

    function getDifficultyEmoji(difficulty) {
      switch(difficulty.toLowerCase()) {
        case 'easy': return '🟢';
        case 'normal': return '🟡';
        case 'hardest': return '🔴';
        default: return '🟡';
      }
    }

    function toggleAnswer(event) {
      const answerElement = event.currentTarget;
      answerElement.classList.toggle('answer-hidden');
      answerElement.classList.toggle('answer-revealed');
    }

    function renderTable() {
      const tbody = document.getElementById('questions-body');
      const emptyState = document.getElementById('empty-state');
      const filteredQuestions = getFilteredQuestions();
      
      if (filteredQuestions.length === 0) {
        emptyState.style.display = '';
        return;
      }
      
      emptyState.style.display = 'none';
      const existingRows = tbody.querySelectorAll('tr:not(#empty-state)');
      existingRows.forEach(row => row.remove());
      
      filteredQuestions.forEach((q, index) => {
        const row = document.createElement('tr');
        row.className = 'table-row border-b border-violet-500/20 hover:bg-violet-800/20 transition-all';
        const answersHtml = q.answers.map((a, i) => 
          `<span class="inline-block bg-violet-900/50 rounded px-2 py-1 text-xs mr-1 mb-1">${String.fromCharCode(65 + i)}) ${a}</span>`
        ).join('');
        
        row.innerHTML = `
          <td class="px-4 py-4">
            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-violet-600/30 text-violet-300 font-bold text-sm">${index + 1}</span>
          </td>
          <td class="px-4 py-4">
            <span class="inline-flex items-center gap-1 bg-indigo-600/30 text-indigo-300 rounded-full px-3 py-1 text-xs font-medium">${q.category}</span>
          </td>
          <td class="px-4 py-4">
            <span class="inline-flex items-center gap-1 ${getDifficultyClass(q.difficulty)} text-white rounded-full px-3 py-1 text-xs font-medium shadow-lg">${getDifficultyEmoji(q.difficulty)} ${q.difficulty}</span>
          </td>
          <td class="px-4 py-4 text-white/90 font-medium">${q.question}</td>
          <td class="px-4 py-4">
            <div class="flex flex-wrap">${answersHtml}</div>
          </td>
          <td class="px-4 py-4">
            <span class="answer-hidden inline-flex items-center gap-1 bg-emerald-600/30 text-emerald-300 rounded-lg px-3 py-2 text-sm font-semibold" title="Klikni da otkriješ odgovor">✓ ${q.correctAnswer}</span>
          </td>
        `;
        tbody.appendChild(row);
        const answerSpan = row.querySelector('.answer-hidden, .answer-revealed');
        answerSpan.addEventListener('click', toggleAnswer);
      });
      
      updateStats();
    }

    function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      document.getElementById('main-title').textContent = config.table_title || defaultConfig.table_title;
    }

    function mapToCapabilities(config) {
      return { recolorables: [], borderables: [], fontEditable: undefined, fontSizeable: undefined };
    }

    function mapToEditPanelValues(config) {
      return new Map([['table_title', config.table_title || defaultConfig.table_title]]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({ defaultConfig, onConfigChange, mapToCapabilities, mapToEditPanelValues });
    }

    populateCategoryFilter();
    renderTable();

    document.getElementById('category-filter').addEventListener('change', (e) => {
      selectedCategory = e.target.value;
      renderTable();
    });

    document.getElementById('difficulty-filter').addEventListener('change', (e) => {
      selectedDifficulty = e.target.value;
      renderTable();
    });

    document.getElementById('reset-filters').addEventListener('click', () => {
      selectedCategory = 'all';
      selectedDifficulty = 'all';
      document.getElementById('category-filter').value = 'all';
      document.getElementById('difficulty-filter').value = 'all';
      renderTable();
    });
